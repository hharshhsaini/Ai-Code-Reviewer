name: AI Code Review (Anthropic)

# Trigger on pull request events
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    
    # Required permissions for the action
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: AI Code Review with Claude
        uses: your-org/ai-code-reviewer@v1
        with:
          # GitHub token for API authentication (automatically provided)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Anthropic API key (add this to your repository secrets)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # Model selection - Claude 3.5 Sonnet (recommended)
          model: 'claude-3-5-sonnet-20241022'
          
          # Optional: Limit number of files to review (default: 50)
          # max_files: 50
          
          # Optional: Minimum severity to post (default: suggestion)
          # Options: critical, warning, suggestion
          # severity_threshold: 'suggestion'
