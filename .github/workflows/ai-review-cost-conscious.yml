name: AI Code Review (Cost-Conscious)

# Trigger on pull request events
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    
    # Required permissions for the action
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: AI Code Review (Budget-Friendly)
        uses: your-org/ai-code-reviewer@v1
        with:
          # GitHub token for API authentication (automatically provided)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          # OpenAI API key for GPT-3.5 Turbo (most cost-effective)
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          
          # GPT-3.5 Turbo is the most budget-friendly option
          model: 'gpt-3.5-turbo'
          
          # Limit to 20 files to minimize token usage
          max_files: 20
          
          # Only post critical issues to reduce output tokens
          severity_threshold: 'critical'
